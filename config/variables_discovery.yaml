cohort:
  name: NHANES 2007-2012
  role: discovery
  design: cross_sectional_complex_survey
  age_filter_years: 18
  note: >
    NHANES 2007-2012 is assembled from three 2-year continuous cycles.
    Confirm final analyte-specific weighting decisions against official documentation
    before fitting manuscript models.

source:
  base_url_template: "https://wwwn.cdc.gov/Nchs/Data/Nhanes/Public/{year}/DataFiles/{component}_{suffix}.xpt"
  cycles:
    - cycle: "2007-2008"
      year: "2007"
      suffix: "E"
    - cycle: "2009-2010"
      year: "2009"
      suffix: "F"
    - cycle: "2011-2012"
      year: "2011"
      suffix: "G"
  components:
    DEMO: "Demographics, survey weights, strata, and PSU"
    ALB_CR: "Urinary albumin and creatinine"
    THYROD: "Thyroid profile and thyroid autoimmunity markers"
    BMX: "Body measures"
    BPX: "Blood pressure examination"
  documentation:
    continuous_nhanes: "https://wwwn.cdc.gov/nchs/nhanes/continuousnhanes/default.aspx"
    thyroid_2007_2008: "https://wwwn.cdc.gov/Nchs/Data/Nhanes/Public/2007/DataFiles/THYROD_E.htm"
    uacr_2007_2008: "https://wwwn.cdc.gov/Nchs/Data/Nhanes/Public/2007/DataFiles/ALB_CR_E.htm"

ids:
  participant_id: SEQN
  cycle: NHANES_CYCLE

survey_design:
  two_year_weight: WTMEC2YR
  combined_weight: WTMEC6YR
  strata: SDMVSTRA
  psu: SDMVPSU
  combined_weight_rule: "WTMEC6YR = WTMEC2YR / 3"

exposure:
  name: UACR
  albumin_ug_ml: URXUMA
  albumin_mg_l: URXUMS
  creatinine_mg_dl: URXUCR
  derived_uacr_mg_g: UACR_MG_G
  derived_log_uacr: LOG_UACR
  formula: "UACR_MG_G = 100 * urine_albumin_mg_l / urine_creatinine_mg_dl"

thyroid_homeostasis:
  tsh: LBXTSH1
  free_t4: LBXT4F
  free_t4_si: LBDT4FSI
  total_t4: LBXTT4
  total_t4_si: LBDT4SI
  free_t3: LBXT3F
  free_t3_si: LBDT3FSI
  total_t3: LBXTT3
  total_t3_si: LBDTT3SI
  thyroglobulin: LBXTGN

thyroid_autoimmunity:
  thyroid_peroxidase_antibody: LBXTPO
  thyroglobulin_antibody: LBXATG

covariates_core:
  age_years: RIDAGEYR
  sex: RIAGENDR
  race_ethnicity: RIDRETH1
  education: DMDEDUC2
  poverty_income_ratio: INDFMPIR
  bmi: BMXBMI
  systolic_bp_candidates:
    - BPXSY1
    - BPXSY2
    - BPXSY3
    - BPXSY4
  diastolic_bp_candidates:
    - BPXDI1
    - BPXDI2
    - BPXDI3
    - BPXDI4

harmonized_outputs:
  - SEQN
  - NHANES_CYCLE
  - WTMEC6YR
  - SDMVSTRA
  - SDMVPSU
  - UACR_MG_G
  - LOG_UACR
  - LBXTSH1
  - LBXT4F
  - LBXTT4
  - LBXT3F
  - LBXTT3
  - LBXTPO
  - LBXATG
