cohort:
  name: NHANES III
  role: external_validation
  design: cross_sectional_complex_survey
  period: "1988-1994"
  note: >
    NHANES III uses fixed-width DAT files plus SAS import programs.
    This skeleton stores the official source files and creates a validation
    preparation report before implementing fixed-width parsing.

source:
  documentation: "https://wwwn.cdc.gov/nchs/nhanes/nhanes3/datafiles.aspx"
  laboratory_1a:
    description: "Laboratory data including urinary albumin and urinary creatinine"
    dat_url: "https://wwwn.cdc.gov/nchs/data/nhanes3/1a/lab.dat"
    sas_url: "https://wwwn.cdc.gov/nchs/data/nhanes3/1a/lab.sas"
    documentation_url: "https://wwwn.cdc.gov/nchs/data/nhanes3/1a/lab-acc.pdf"
  laboratory_2a:
    description: "Second laboratory data including total T4, TSH, and thyroid antibodies"
    dat_url: "https://wwwn.cdc.gov/nchs/data/nhanes3/2a/lab2.dat"
    sas_url: "https://wwwn.cdc.gov/nchs/data/nhanes3/2a/lab2.sas"
    documentation_url: "https://wwwn.cdc.gov/nchs/data/nhanes3/2a/lab2-acc.pdf"

ids:
  participant_id: SEQN

survey_design:
  six_year_weight_candidate: WTPFEX6
  strata_candidate: SDPSTRA6
  psu_candidate: SDPPSU6
  note: "Confirm final NHANES III weights after harmonizing eligible lab sample and analysis population."

exposure:
  name: UACR
  albumin_ug_ml_candidate: UBP
  creatinine_mg_dl_candidate: URP
  derived_uacr_mg_g: UACR_MG_G
  derived_log_uacr: LOG_UACR
  formula: "UACR_MG_G = 100 * urine_albumin_mg_l / urine_creatinine_mg_dl"

thyroid_homeostasis:
  total_t4_candidate: T4P
  total_t4_si_candidate: T4PSI
  tsh_candidate: THP
  tsh_si_candidate: THPSI

thyroid_autoimmunity:
  antimicrosomal_antibody_candidate: TMP
  thyroglobulin_antibody_candidate: TAP
  note: "NHANES III autoimmunity markers may need harmonized naming with later TPOAb/TgAb variables."

harmonized_outputs:
  - SEQN
  - WTPFEX6
  - SDPSTRA6
  - SDPPSU6
  - UACR_MG_G
  - LOG_UACR
  - THP
  - T4P
  - TMP
  - TAP
